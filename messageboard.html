<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 中国非遗文化传承平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f7f3ee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: #8c5c2d;
            color: #fff;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .top-bar .logo {
            font-size: 18px;
            font-weight: bold;
        }

        .top-bar .user a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
        }

        .top-bar .user span {
            color: #ffd966;
        }

        .nav {
            background: #6d4422;
            padding: 14px 0;
            text-align: center;
        }

        .nav a {
            color: #fff;
            margin: 0 12px;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover, .nav a.active {
            text-decoration: underline;
            color: #ffd966;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* 留言输入区 */
        .message-input-area {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .message-input-area h3 {
            color: #8c5c2d;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .message-input-area textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #e0d5c8;
            border-radius: 16px;
            font-size: 15px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            background: #fefaf5;
        }

        .message-input-area textarea:focus {
            outline: none;
            border-color: #8c5c2d;
        }

        .message-submit {
            margin-top: 15px;
            padding: 12px 30px;
            background: #8c5c2d;
            color: #fff;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .message-submit:hover {
            background: #6d4422;
        }

        .message-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }        /* 留言列表区 */
        .message-list-area {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .message-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e8ddd0;
        }

        .message-list-header h3 {
            color: #8c5c2d;
            font-size: 20px;
        }

        .message-count {
            background: #e8ddd0;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            color: #5a3a2a;
        }

        /* 留言条目 */
        .message-item {
            border-bottom: 1px solid #f0e8df;
            padding: 20px 0;
            display: flex;
            gap: 15px;
            transition: background 0.2s;
        }

        .message-item:hover {
            background: #fefaf5;
        }

        .message-avatar {
            width: 52px;
            height: 52px;
            background: #e8ddd0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .message-name {
            font-weight: bold;
            color: #5a3a2a;
            font-size: 16px;
        }

        .message-time {
            font-size: 12px;
            color: #9b7a5a;
        }

        .message-text {
            color: #4a3a2a;
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .message-actions {
            display: flex;
            gap: 20px;
        }

        .message-like {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 13px;
            color: #9b7a5a;
            transition: color 0.2s;
        }

        .message-like:hover {
            color: #ff6b6b;
        }

        .message-delete {
            cursor: pointer;
            font-size: 13px;
            color: #c33;
            display: none;
            transition: color 0.2s;
        }

        .message-delete:hover {
            text-decoration: underline;
        }

        .message-item.own .message-delete {
            display: inline;
        }

        /* 空状态 */
        .no-messages {
            text-align: center;
            color: #9b7a5a;
            padding: 50px 20px;
        }

        .no-messages .icon {
            font-size: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* 登录提示 */
        .login-prompt {
            text-align: center;
            padding: 50px;
            background: #fff;
            border-radius: 24px;
            color: #8c5c2d;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .login-prompt .icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .login-prompt a {
            color: #8c5c2d;
            font-weight: bold;
            text-decoration: underline;
        }        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #9b7a5a;
        }

        .footer {
            background: #2e241d;
            color: #e9dbc9;
            text-align: center;
            padding: 25px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }
            .message-input-area, .message-list-area {
                padding: 20px;
            }
            .message-avatar {
                width: 44px;
                height: 44px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🏮 中国非遗文化传承平台</div>
        <div class="user" id="userArea">
            <a href=" ">登录</a >
            <a href="register.html">注册</a >
        </div>
    </div>

    <div class="nav">
        <a href="index.html">首页</a >
        <a href="paper.html">剪纸艺术</a >
        <a href="opera.html">京剧</a >
        <a href="shadow.html">皮影戏</a >
        <a href="iron.html">打铁花</a >
        <a href="profile.html">个人中心</a >
        <a href="checkin.html">每日打卡</a >
        <a href="messageboard.html" class="active">留言板</a >
        <a href="certificate.html">非遗证书</a >
    </div>

    <div class="container" id="mainContent">
        <div class="loading">加载中...</div>
    </div>

    <div class="footer">
        <p>非遗文化传承 © 2026 | 守护非遗 · 赓续文脉</p >
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== Supabase 配置 ==========
         const SUPABASE_URL = 'https://lpqlwlrvgdlsxqxstqks.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Olxzn4JDOU2lTNXKBQzkTg_DPYHThi3';


        // ====================================
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        
        // 检查登录状态
        async function checkLoginStatus() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const userDiv = document.getElementById('userArea');
            
            if (session) {
                currentUser = session.user;
                const userName = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
                userDiv.innerHTML = `<span>欢迎，${userName}</span><a href="#" onclick="logout()">退出</a >`;
                renderMessageBoard();
                loadMessages();
            } else {
                userDiv.innerHTML = `<a href="login.html">登录</a ><a href="register.html">注册</a >`;
                renderLoginPrompt();
            }
        }
        
        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }
        window.logout = logout;
        
        // 渲染留言板
        function renderMessageBoard() {
            document.getElementById('mainContent').innerHTML = `
                <div class="message-input-area">
                    <h3>💬 写下你的留言</h3>
                    <textarea id="messageInput" placeholder="分享你对非遗文化的感受、建议或故事..."></textarea>
                    <button class="message-submit" id="submitBtn" onclick="submitMessage()">📝 发表留言</button>
                </div>
                <div class="message-list-area">
                    <div class="message-list-header">
                        <h3>📖 非遗留言板</h3>
                        <span class="message-count" id="messageCount">0条留言</span>
                    </div>
                    <div id="messageList"></div>
                </div>
            `;
        }
        
        // 渲染登录提示
        function renderLoginPrompt() {
            document.getElementById('mainContent').innerHTML = `
                <div class="login-prompt">
                    <div class="icon">💬</div>
                    <h3>登录后可以留言和互动</h3>
                    <p><a href="login.html">立即登录</a > 或 <a href="register.html">注册账号</a ></p >
                    <p style="margin-top: 15px; font-size: 14px;">留言板是非遗爱好者交流的平台，分享你的感受吧！</p >
                </div>
            `;
        }        // 加载留言列表
        async function loadMessages() {
            const messageListDiv = document.getElementById('messageList');
            const messageCountSpan = document.getElementById('messageCount');
            
            if (!messageListDiv) return;
            
            messageListDiv.innerHTML = '<div class="loading">加载留言中...</div>';
            
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('加载留言失败:', error);
                messageListDiv.innerHTML = '<div class="no-messages"><div class="icon">⚠️</div>加载失败，请刷新重试</div>';
                return;
            }
            
            if (!data || data.length === 0) {
                messageListDiv.innerHTML = `
                    <div class="no-messages">
                        <div class="icon">💭</div>
                        <p>还没有留言，来抢沙发吧！</p >
                        <p style="font-size: 13px; margin-top: 8px;">分享你对非遗文化的热爱~</p >
                    </div>
                `;
                if (messageCountSpan) messageCountSpan.textContent = '0条留言';
                return;
            }
            
            if (messageCountSpan) messageCountSpan.textContent = `${data.length}条留言`;
            
            // 渲染留言列表
            messageListDiv.innerHTML = data.map(message => {
                const isOwn = currentUser && message.user_id === currentUser.id;
                return `
                    <div class="message-item ${isOwn ? 'own' : ''}" data-id="${message.id}">
                        <div class="message-avatar">${message.user_avatar || '👤'}</div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-name">${escapeHtml(message.user_name)}</span>
                                <span class="message-time">${formatTime(message.created_at)}</span>
                            </div>
                            <div class="message-text">${escapeHtml(message.content)}</div>
                            <div class="message-actions">
                                <div class="message-like" onclick="likeMessage('${message.id}', this)">
                                    ❤️ <span>${message.likes || 0}</span>
                                </div>
                                ${isOwn ? `<div class="message-delete" onclick="deleteMessage('${message.id}')">🗑️ 删除</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 发表留言
        async function submitMessage() {
            if (!currentUser) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }
            
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) {
                alert('请输入留言内容');
                return;
            }
            
            if (content.length > 500) {
                alert('留言内容不能超过500字');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '发表中...';
            
            const userName = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
            const userAvatar = currentUser.user_metadata?.avatar || '👤';
            
            const { error } = await supabaseClient.from('messages').insert({
                user_id: currentUser.id,
                user_name: userName,
                user_avatar: userAvatar,
                content: content,
                likes: 0
            });
            
            submitBtn.disabled = false;
            submitBtn.textContent = '📝 发表留言';
            
            if (error) {
                alert('发表失败：' + error.message);
            } else {
                input.value = '';
                await loadMessages();
                alert('✅ 留言发表成功！');
            }
        }
        window.submitMessage = submitMessage;
        
        // 点赞留言
        async function likeMessage(messageId, element) {
            if (!currentUser) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }
            
            const { data: message } = await supabaseClient
                .from('messages')
                .select('likes')
                .eq('id', messageId)
                .single();
            
            const newLikes = (message?.likes || 0) + 1;
            
            const { error } = await supabaseClient
                .from('messages')
                .update({ likes: newLikes })
                .eq('id', messageId);
            
            if (!error) {
                const likeSpan = element.querySelector('span');
                if (likeSpan) likeSpan.textContent = newLikes;
            }
        }
        window.likeMessage = likeMessage;
        
        // 删除留言
        async function deleteMessage(messageId) {
            if (!confirm('确定要删除这条留言吗？')) return;
            
            const { error } = await supabaseClient
                .from('messages')
                .delete()
                .eq('id', messageId);
            
            if (error) {
                alert('删除失败：' + error.message);
            } else {
                await loadMessages();
                alert('留言已删除');
            }
        }
        window.deleteMessage = deleteMessage;
        
        // 辅助函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
            if (diff < 2592000) return `${Math.floor(diff / 86400)}天前`;
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }
        
        // 初始化
        checkLoginStatus();
    </script>
</body>
</html>
