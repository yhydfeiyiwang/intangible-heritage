<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日打卡 - 中国非遗文化传承平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #f7f3ee; min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: #8c5c2d; color: #fff; padding: 12px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .top-bar .logo { font-size: 18px; font-weight: bold; }
        .top-bar .user a { color: #fff; margin-left: 20px; text-decoration: none; }
        .top-bar .user span { color: #ffd966; }
        .nav { background: #6d4422; padding: 14px 0; text-align: center; }
        .nav a { color: #fff; margin: 0 18px; text-decoration: none; font-size: 16px; }
        .nav a:hover, .nav a.active { text-decoration: underline; color: #ffd966; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; flex: 1; }
        
        /* 打卡卡片 */
        .checkin-card {
            background: #fff;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .checkin-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .checkin-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-box {
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #8c5c2d;
        }
        .stat-label {
            color: #9b7a5a;
            font-size: 14px;
        }
        .checkin-btn {
            background: #8c5c2d;
            color: #fff;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .checkin-btn:hover { background: #6d4422; transform: scale(1.02); }
        .checkin-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .checkin-btn.already { background: #27ae60; cursor: default; }
        
        /* 日历 */
        .calendar {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-month {
            font-size: 20px;
            font-weight: bold;
            color: #8c5c2d;
        }
        .calendar-nav {
            display: flex;
            gap: 15px;
        }
        .calendar-nav button {
            background: #f7f3ee;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #8c5c2d;
            padding: 10px 0;
            border-bottom: 1px solid #e8ddd0;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 15px 0;
        }
        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            background: #fefaf5;
            transition: all 0.2s;
        }
        .day.checked {
            background: #8c5c2d;
            color: #fff;
            position: relative;
        }
        .day.checked::after {
            content: "✓";
            position: absolute;
            font-size: 10px;
            bottom: 2px;
            right: 2px;
        }
        .day.today {
            border: 2px solid #ffd966;
        }
        .day.other-month {
            color: #ccc;
        }
        .footer { background: #2e241d; color: #e9dbc9; text-align: center; padding: 25px; margin-top: 30px; }  @media (max-width: 768px) { .nav a { margin: 0 10px; font-size: 14px; } .checkin-stats { gap: 20px; } .stat-number { font-size: 28px; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🏮 中国非遗文化传承平台</div>
        <div class="user" id="userArea"><a href=" ">登录</a ><a href="register.html">注册</a ></div>
    </div>
    <div class="nav">
        <a href="index.html">首页</a ><a href="paper.html">剪纸艺术</a ><a href="opera.html">京剧</a >
        <a href="shadow.html">皮影戏</a ><a href="iron.html">打铁花</a ><a href="profile.html">个人中心</a >
        <a href="checkin.html" class="active">每日打卡</a ><a href="messageboard.html">留言板</a >
    </div>
    <div class="container">
        <div class="checkin-card">
            <div class="checkin-icon">📅</div>
            <h2>非遗文化打卡</h2>
            <p>每天坚持打卡，传承中华文化</p >
            <div class="checkin-stats">
                <div class="stat-box"><div class="stat-number" id="totalDays">0</div><div class="stat-label">累计打卡</div></div>
                <div class="stat-box"><div class="stat-number" id="continuousDays">0</div><div class="stat-label">连续打卡</div></div>
                <div class="stat-box"><div class="stat-number" id="points">0</div><div class="stat-label">非遗积分</div></div>
            </div>
            <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">今日打卡</button>
        </div>
        
        <div class="calendar">
            <div class="calendar-header">
                <span class="calendar-month" id="currentMonth">2024年1月</span>
                <div class="calendar-nav">
                    <button onclick="prevMonth()">◀ 上月</button>
                    <button onclick="nextMonth()">下月 ▶</button>
                </div>
            </div>
            <div class="weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="days" id="daysGrid"></div>
        </div>
    </div>
    <div class="footer"><p>非遗文化传承 © 2026 | 守护非遗 · 赓续文脉</p ></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://lpalwlrvgdlslsxqxsxtqks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_iVeYNZ3aI8DpUhWy5Z6k6g_uUgvmzgR';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let checkinDates = [];
        let currentDate = new Date();
        
        async function checkLogin() {
            const { data: { session } } = await supabase.auth.getSession();
            const userDiv = document.getElementById('userArea');
            if (session) {
                currentUser = session.user;
                const userName = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
                userDiv.innerHTML = `<span>欢迎，${userName}</span><a href="#" onclick="logout()">退出</a >`;
                loadCheckinData();
            } else {
                userDiv.innerHTML = `<a href="login.html">登录</a ><a href="register.html">注册</a >`;
                document.getElementById('checkinBtn').disabled = true;
                document.getElementById('checkinBtn').textContent = '请先登录';
            }
        }
        
        async function logout() { await supabase.auth.signOut(); window.location.reload(); }
        window.logout = logout;
        
        async function loadCheckinData() {
            const { data } = await supabase.from('checkins').select('checkin_date').eq('user_id', currentUser.id);
            if (data) {
                checkinDates = data.map(d => d.checkin_date);
                updateStats();
                renderCalendar();
                checkTodayStatus();
            }
        }
        
        function updateStats() {
            document.getElementById('totalDays').textContent = checkinDates.length;
            let continuous = 0;
            let today = new Date().toISOString().split('T')[0];
            let check = new Date();
            while (checkinDates.includes(check.toISOString().split('T')[0])) {
                continuous++;
                check.setDate(check.getDate() - 1);
            }
            document.getElementById('continuousDays').textContent = continuous;
            let points = checkinDates.length * 10;
            document.getElementById('points').textContent = points;
        }
        
        function checkTodayStatus() {
            const today = new Date().toISOString().split('T')[0];
            const btn = document.getElementById('checkinBtn');
            if (checkinDates.includes(today)) {
                btn.textContent = '✅ 今日已打卡';
                btn.classList.add('already');
                btn.disabled = true;
            } else {
                btn.textContent = '📅 今日打卡';
                btn.classList.remove('already');
                btn.disabled = false;
            }
        }async function doCheckin() {
            if (!currentUser) { alert('请先登录'); return; }
            const today = new Date().toISOString().split('T')[0];
            if (checkinDates.includes(today)) { alert('今日已打卡！'); return; }
            const { error } = await supabase.from('checkins').insert({ user_id: currentUser.id, checkin_date: today });
            if (error) { alert('打卡失败：' + error.message); } 
            else {
                alert('🎉 打卡成功！获得10积分');
                checkinDates.push(today);
                updateStats();
                renderCalendar();
                checkTodayStatus();
            }
        }
        window.doCheckin = doCheckin;
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startWeekday = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();
            
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            
            let daysHtml = '';
            for (let i = startWeekday - 1; i >= 0; i--) {
                let day = prevMonthDays - i;
                daysHtml += `<div class="day other-month">${day}</div>`;
            }
            for (let d = 1; d <= daysInMonth; d++) {
                let dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                let isChecked = checkinDates.includes(dateStr);
                let isToday = new Date().toISOString().split('T')[0] === dateStr;
                let classes = 'day';
                if (isChecked) classes += ' checked';
                if (isToday) classes += ' today';
                daysHtml += `<div class="${classes}">${d}</div>`;
            }
            let totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;
            let remaining = totalCells - (startWeekday + daysInMonth);
            for (let i = 1; i <= remaining; i++) {
                daysHtml += `<div class="day other-month">${i}</div>`;
            }
            document.getElementById('daysGrid').innerHTML = daysHtml;
        }
        
        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
        window.prevMonth = prevMonth;
        window.nextMonth = nextMonth;
        
        checkLogin();
    </script>
</body>
</html>
