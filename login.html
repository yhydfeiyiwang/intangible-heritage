<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中国非遗文化传承平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: linear-gradient(135deg, #f7f3ee 0%, #e8ddd0 100%); min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: #8c5c2d; color: #fff; padding: 12px 40px; display: flex; justify-content: space-between; align-items: center; }
        .top-bar .logo { font-size: 18px; font-weight: bold; }
        .top-bar .user a { color: #fff; margin-left: 20px; text-decoration: none; }
        .nav { background: #6d4422; padding: 14px 0; text-align: center; }
        .nav a { color: #fff; margin: 0 12px; text-decoration: none; font-size: 14px; }
        .nav a:hover { text-decoration: underline; }
        .login-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 50px 20px; }
        .login-box { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); width: 100%; max-width: 400px; }
        .login-box h2 { text-align: center; color: #8c5c2d; margin-bottom: 30px; font-size: 28px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #5a3a2a; font-weight: 500; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .input-group input:focus { outline: none; border-color: #8c5c2d; }
        .login-btn { width: 100%; padding: 12px; background: #8c5c2d; color: #fff; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        .login-btn:hover { background: #6d4422; }
        .login-btn:disabled { background: #ccc; cursor: not-allowed; }
        .register-link { text-align: center; margin-top: 20px; color: #666; }
        .register-link a { color: #8c5c2d; text-decoration: none; }
        .error-msg { background: #ffe0e0; color: #c33; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .success-msg { background: #e0ffe0; color: #27ae60; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .footer { background: #2e241d; color: #e9dbc9; text-align: center; padding: 25px; margin-top: auto; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🏮 中国非遗文化传承平台</div>
        <div class="user"><a href=" ">登录</a ><a href="register.html">注册</a ></div>
    </div>
    <div class="nav">
        <a href="index.html">首页</a ><a href="paper.html">剪纸艺术</a ><a href="opera.html">京剧</a >
        <a href="shadow.html">皮影戏</a ><a href="iron.html">打铁花</a ><a href="profile.html">个人中心</a >
        <a href="checkin.html">每日打卡</a ><a href="messageboard.html">留言板</a ><a href="certificate.html">非遗证书</a >
    </div>
    <div class="login-container">
        <div class="login-box">            <h2>用户登录</h2>
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
            <form id="loginForm">
                <div class="input-group"><label>邮箱</label><input type="email" id="email" placeholder="请输入注册邮箱" required></div>
                <div class="input-group"><label>密码</label><input type="password" id="password" placeholder="请输入密码" required></div>
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            </form>
            <div class="register-link">还没有账号？ <a href=" ">立即注册</a ></div>
        </div>
    </div>
    <div class="footer"><p>非遗文化传承 © 2026 | 守护非遗 · 赓续文脉</p ></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== Supabase 配置 ==========
          const SUPABASE_URL = 'https://lpqlwlrvgdlsxqxstqks.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Olxzn4JDOU2lTNXKBQzkTg_DPYHThi3';
        // ====================================
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 检查是否已登录，如果已登录则跳转首页
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    errorMsg.textContent = '登录失败：' + error.message;
                    errorMsg.style.display = 'block';
                } else if (data.session) {
                    successMsg.textContent = '登录成功！正在跳转...';
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
