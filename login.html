<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中国非遗文化传承平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f7f3ee 0%, #e8ddd0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: #8c5c2d;
            color: #fff;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar .logo {
            font-size: 18px;
            font-weight: bold;
        }

        .top-bar .user a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
        }

        .nav {
            background: #6d4422;
            padding: 14px 0;
            text-align: center;
        }

        .nav a {
            color: #fff;
            margin: 0 25px;
            text-decoration: none;
            font-size: 17px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
        }     
       .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            text-align: center;
            color: #8c5c2d;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #5a3a2a;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #8c5c2d;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #8c5c2d;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #6d4422;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .register-link a {
            color: #8c5c2d;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: #ffe0e0;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .footer {
            background: #2e241d;
            color: #e9dbc9;
            text-align: center;
            padding: 25px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🏮 中国非遗文化传承平台</div>
        <div class="user">
            <a href=" ">登录</a >
            <a href="register.html">注册</a >
        </div>
    </div>

    <div class="nav">
        <a href="index.html">首页</a >
        <a href="paper.html">剪纸艺术</a >
        <a href="opera.html">京剧</a >
        <a href="shadow.html">皮影戏</a >
        <a href="iron.html">打铁花</a >
    </div>

    <div class="login-container">
        <div class="login-box">
            <h2>用户登录</h2>
            <div class="error-msg" id="errorMsg">用户名或密码错误</div>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>
            <div class="register-link">
                还没有账号？ <a href="register.html">立即注册</a >
            </div>
        </div>
    </div>

    <div class="footer">
        <p>非遗文化传承 © 2026 | 守护非遗 · 赓续文脉</p >
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 模拟登录验证（实际项目中应调用后端接口）
            if (username && password) {
                // 保存登录状态
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                alert('登录成功！欢迎 ' + username);
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
            return false;
        }
    </script>
</body>
</html>
