<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗证书 - 中国非遗文化传承平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f7f3ee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: #8c5c2d;
            color: #fff;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .top-bar .logo {
            font-size: 18px;
            font-weight: bold;
        }

        .top-bar .user a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
        }

        .top-bar .user span {
            color: #ffd966;
        }

        .nav {
            background: #6d4422;
            padding: 14px 0;
            text-align: center;
        }

        .nav a {
            color: #fff;
            margin: 0 12px;
            text-decoration: none;
            font-size: 14px;
        }

        .nav a:hover, .nav a.active {
            text-decoration: underline;
            color: #ffd966;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* 学习进度区域 */
        .progress-section {
            background: #fff;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .progress-title {
            font-size: 24px;
            color: #8c5c2d;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-stats {
            background: #fef5e8;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stats-info {
            display: flex;
            gap: 40px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #8c5c2d;
        }

        .stat-label {
            font-size: 13px;
            color: #9b7a5a;
            margin-top: 5px;
        }

        .progress-bar {
            flex: 1;
            min-width: 200px;
        }

        .progress-bar-bg {
            background: #e8ddd0;
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: #8c5c2d;
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .progress-percent {
            font-size: 14px;
            color: #8c5c2d;
            margin-top: 8px;
            text-align: right;
        }

        /* 非遗项目卡片 */
        .learning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .learning-item {
            background: #fefaf5;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border: 2px solid #e8ddd0;
        }

        .learning-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .learning-item.completed {
            background: linear-gradient(135deg, #8c5c2d, #b87a3a);
            border-color: #ffd966;
        }

        .learning-item.completed .item-icon,
        .learning-item.completed .item-name,
        .learning-item.completed .item-desc {
            color: #fff;
        }        .item-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #5a3a2a;
            margin-bottom: 8px;
        }

        .item-desc {
            font-size: 12px;
            color: #9b7a5a;
        }

        .check-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 24px;
            color: #ffd966;
        }

        .learn-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: #8c5c2d;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }

        .learning-item.completed .learn-btn {
            background: #fff;
            color: #8c5c2d;
            cursor: default;
        }

        .learn-btn:hover {
            background: #6d4422;
        }

        .learning-item.completed .learn-btn:hover {
            background: #fff;
        }

        /* 证书区域 */
        .certificate-section {
            background: #fff;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .certificate-card {
            background: linear-gradient(135deg, #fff9ef, #fff5e8);
            border: 3px solid #e0b87a;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 20px;
        }

        .certificate-card::before {
            content: "🏮";
            position: absolute;
            font-size: 180px;
            opacity: 0.08;
            bottom: -40px;
            right: -40px;
            pointer-events: none;
        }

        .certificate-card::after {
            content: "✂️";
            position: absolute;
            font-size: 150px;
            opacity: 0.08;
            top: -30px;
            left: -30px;
            pointer-events: none;
        }

        .certificate-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .certificate-title {
            font-size: 32px;
            color: #8c5c2d;
            margin-bottom: 15px;
            font-family: "华文楷书", "KaiTi", cursive;
            letter-spacing: 4px;
        }

        .certificate-subtitle {
            font-size: 14px;
            color: #b87a3a;
            margin-bottom: 25px;
            border-top: 1px solid #e0b87a;
            border-bottom: 1px solid #e0b87a;
            display: inline-block;
            padding: 5px 20px;
        }

        .certificate-name {
            font-size: 28px;
            font-weight: bold;
            color: #c97e2a;
            margin: 25px 0;
            font-family: "华文楷书", "KaiTi", cursive;
            border-bottom: 2px dotted #e0b87a;
            display: inline-block;
            padding-bottom: 8px;
        }

        .certificate-content {
            font-size: 16px;
            color: #5a3a2a;
            line-height: 1.8;
            margin: 20px 0;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .certificate-items {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .certificate-item {
            background: #fef5e8;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            color: #8c5c2d;
        }

        .certificate-date {
            font-size: 12px;
            color: #9b7a5a;
            margin-top: 20px;
        }

        .certificate-code {
            font-size: 12px;
            color: #c9aa7a;
            margin-top: 15px;
            font-family: monospace;
        }

        .download-btn {
            background: #8c5c2d;
            color: #fff;
            border: none;
            padding: 12px 40px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #6d4422;
        }

        .no-certificate {
            text-align: center;
            padding: 40px;
            color: #9b7a5a;
        }

        .login-prompt {
            text-align: center;
            padding: 60px;
            background: #fff;
            border-radius: 24px;
            color: #8c5c2d;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .login-prompt .icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .login-prompt a {
            color: #8c5c2d;
            font-weight: bold;
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #9b7a5a;
        }

        .footer {
            background: #2e241d;
            color: #e9dbc9;
            text-align: center;
            padding: 25px;
            margin-top: 30px;
        }        @media (max-width: 768px) {
            .learning-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .certificate-title {
                font-size: 22px;
            }
            .certificate-name {
                font-size: 20px;
            }
            .stats-info {
                gap: 20px;
            }
            .stat-number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🏮 中国非遗文化传承平台</div>
        <div class="user" id="userArea">
            <a href=" ">登录</a >
            <a href="register.html">注册</a >
        </div>
    </div>

    <div class="nav">
        <a href="index.html">首页</a >
        <a href="paper.html">剪纸艺术</a >
        <a href="opera.html">京剧</a >
        <a href="shadow.html">皮影戏</a >
        <a href="iron.html">打铁花</a >
        <a href="profile.html">个人中心</a >
        <a href="checkin.html">每日打卡</a >
        <a href="messageboard.html">留言板</a >
        <a href="certificate.html" class="active">非遗证书</a >
    </div>

    <div class="container" id="mainContent">
        <div class="loading">加载中...</div>
    </div>

    <div class="footer">
        <p>非遗文化传承 © 2026 | 守护非遗 · 赓续文脉</p >
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== Supabase 配置 ==========
        const SUPABASE_URL = 'https://lpqlwlrvgdlsxqxstqks.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Olxzn4JDOU2lTNXKBQzkTg_DPYHThi3';


        // ====================================
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 四类非遗项目
        const ITEMS = [
            { type: 'paper', name: '剪纸艺术', icon: '✂️', desc: '镂空艺术，民间瑰宝', link: 'paper.html' },
            { type: 'opera', name: '京剧', icon: '🎭', desc: '国粹经典，唱念做打', link: 'opera.html' },
            { type: 'shadow', name: '皮影戏', icon: '🎬', desc: '光影传奇，千年传承', link: 'shadow.html' },
            { type: 'iron', name: '打铁花', icon: '🔥', desc: '铁水腾空，火树银花', link: 'iron.html' }
        ];
        
        let currentUser = null;
        let learnedItems = [];
        
        // 检查登录状态
        async function checkLoginStatus() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const userDiv = document.getElementById('userArea');
            
            if (session) {
                currentUser = session.user;
                const userName = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
                userDiv.innerHTML = `<span>欢迎，${userName}</span><a href="#" onclick="logout()">退出</a >`;
                await loadLearningRecords();
                renderPage();
            } else {
                userDiv.innerHTML = `<a href="login.html">登录</a ><a href="register.html">注册</a >`;
                document.getElementById('mainContent').innerHTML = `
                    <div class="login-prompt">
                        <div class="icon">🎓</div>
                        <h3>登录后可以学习非遗项目并获得证书</h3>
                        <p><a href="login.html">立即登录</a > 或 <a href="register.html">注册账号</a ></p >
                        <p style="margin-top: 15px; font-size: 14px;">完成四个非遗项目的学习，即可获得非遗传承人证书！</p >
                    </div>
                `;
            }
        }async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }
        window.logout = logout;
        
        // 加载学习记录
        async function loadLearningRecords() {
            const { data, error } = await supabaseClient
                .from('learning_records')
                .select('item_type')
                .eq('user_id', currentUser.id);
            
            if (!error && data) {
                learnedItems = data.map(d => d.item_type);
            } else {
                learnedItems = [];
            }
        }
        
        // 标记为已学习
        async function markAsLearned(itemType, itemName) {
            if (learnedItems.includes(itemType)) {
                alert(`你已经学习过 ${itemName} 了！`);
                return;
            }
            
            const { error } = await supabaseClient
                .from('learning_records')
                .insert({
                    user_id: currentUser.id,
                    item_type: itemType
                });
            
            if (error) {
                alert('操作失败：' + error.message);
            } else {
                learnedItems.push(itemType);
                renderPage();
                alert(`🎉 恭喜！你已完成《${itemName}》的学习！`);
            }
        }
        window.markAsLearned = markAsLearned;
        
        // 渲染页面
        function renderPage() {
            const completedCount = learnedItems.length;
            const totalCount = ITEMS.length;
            const progressPercent = (completedCount / totalCount) * 100;
            const canGetCertificate = completedCount === totalCount;
            
            let gridHtml = `
                <div class="progress-section">
                    <div class="progress-title">
                        📚 非遗学习进度
                    </div>
                    <div class="progress-stats">
                        <div class="stats-info">
                            <div class="stat">
                                <div class="stat-number">${completedCount}</div>
                                <div class="stat-label">已完成</div>
                            </div>
                            <div class="stat">
                                <div class="stat-number">${totalCount}</div>
                                <div class="stat-label">总项目</div>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
                            </div>
                            <div class="progress-percent">${Math.round(progressPercent)}% 完成</div>
                        </div>
                    </div>
                    
                    <div class="learning-grid">
            `;
            
            ITEMS.forEach(item => {
                const isCompleted = learnedItems.includes(item.type);
                gridHtml += `
                    <div class="learning-item ${isCompleted ? 'completed' : ''}">
                        ${isCompleted ? '<div class="check-badge">✅</div>' : ''}
                        <div class="item-icon">${item.icon}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.desc}</div>
                        ${!isCompleted ? `
                            <button class="learn-btn" onclick="markAsLearned('${item.type}', '${item.name}')">
                                📖 点击学习
                            </button>
                        ` : `
                            <button class="learn-btn" style="background:#e8ddd0; color:#8c5c2d;">
                                ✅ 已完成
                            </button>
                        `}
                    </div>
                `;
            });
            
            gridHtml += `
                    </div>
                </div>
            `;
            
            // 证书区域
            if (canGetCertificate && completedCount === totalCount) {
                const userName = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
                const today = new Date();
                const certDate = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
                const certCode = `FY${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}${currentUser.id.slice(-6).toUpperCase()}`;
                
                gridHtml += `
                    <div class="certificate-section">
                        <div class="progress-title">
                            🏆 非遗传承人证书
                        </div>
                        <div class="certificate-card" id="certificateCard">
                            <div class="certificate-icon">🏮</div>
                            <div class="certificate-title">非物质文化遗产</div>
                            <div class="certificate-subtitle">学习认证证书</div>
                            <div class="certificate-name">${escapeHtml(userName)}</div>
                            <div class="certificate-content">
                                已完成中国四大非物质文化遗产项目的学习，深刻理解了<br>
                                剪纸艺术、京剧、皮影戏、打铁花的历史渊源与技艺精髓，<br>
                                特授予「非遗传承人」荣誉称号。
                            </div>
                            <div class="certificate-items">
                                <span class="certificate-item">✂️ 剪纸艺术</span>
                                <span class="certificate-item">🎭 京剧</span>
                                <span class="certificate-item">🎬 皮影戏</span>
                                <span class="certificate-item">🔥 打铁花</span>
                            </div>
                            <div class="certificate-date">颁发日期：${certDate}</div>
                            <div class="certificate-code">证书编号：${certCode}</div>
                            <button class="download-btn" onclick="downloadCertificate()">📥 下载证书（图片）</button>
                        </div>
                    </div>
                `;            } else if (completedCount > 0) {
                const remainingCount = totalCount - completedCount;
                const completedNames = learnedItems.map(t => ITEMS.find(i => i.type === t)?.name).filter(Boolean);
                gridHtml += `
                    <div class="certificate-section">
                        <div class="no-certificate">
                            <div style="font-size: 48px; margin-bottom: 15px;">🎯</div>
                            <p style="font-size: 18px; margin-bottom: 10px;">还需学习 ${remainingCount} 个非遗项目</p >
                            <p style="font-size: 14px;">即可获得非遗传承人证书！</p >
                            <div style="margin-top: 15px; padding: 10px; background: #fef5e8; border-radius: 12px; display: inline-block;">
                                已完成：${completedNames.join('、')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                gridHtml += `
                    <div class="certificate-section">
                        <div class="no-certificate">
                            <div style="font-size: 48px; margin-bottom: 15px;">📖</div>
                            <p>点击上方任意非遗项目开始学习</p >
                            <p style="font-size: 14px; margin-top: 8px;">完成全部4个项目即可获得非遗证书！</p >
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('mainContent').innerHTML = gridHtml;
        }
        
        // 下载证书为图片
        async function downloadCertificate() {
            const certCard = document.getElementById('certificateCard');
            if (!certCard) {
                alert('请先完成所有学习获得证书');
                return;
            }
            
            try {
                // 动态引入 html2canvas
                if (typeof html2canvas === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                    document.head.appendChild(script);
                    await new Promise(resolve => { script.onload = resolve; });
                }
                
                const btn = document.querySelector('.download-btn');
                const originalText = btn.textContent;
                btn.textContent = '生成中...';
                btn.disabled = true;
                
                const canvas = await html2canvas(certCard, {
                    scale: 2,
                    backgroundColor: '#fff9ef',
                    logging: false
                });
                
                const link = document.createElement('a');
                const userName = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
                link.download = `非遗证书_${userName}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                btn.textContent = originalText;
                btn.disabled = false;
                alert('证书已保存为图片！');
            } catch (err) {
                console.error(err);
                alert('生成图片失败，请手动截图保存');
                const btn = document.querySelector('.download-btn');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '📥 下载证书（图片）';
                }
            }
        }
        window.downloadCertificate = downloadCertificate;
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 页面初始化
        checkLoginStatus();
    </script>
</body>
</html>
