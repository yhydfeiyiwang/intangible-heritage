<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>注册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f7f3ee;display:flex;justify-content:center;align-items:center;height:100vh}
.reg-box{width:420px;background:#fff;padding:45px;border-radius:12px;box-shadow:0 0 18px rgba(0,0,0,0.1)}
.reg-box h2{text-align:center;margin-bottom:35px;color:#8c5c2d}
input{width:100%;padding:14px;margin:12px 0;border:1px solid #ddd;border-radius:6px;font-size:16px}
button{width:100%;padding:14px;background:#8c5c2d;color:#fff;border:none;border-radius:6px;font-size:17px;margin-top:15px;cursor:pointer}
.btn-box{text-align:center;margin-top:20px}
.btn-box a{color:#8c5c2d;text-decoration:none}
</style>
</head>
<body>
<div class="reg-box">
<h2>用户注册</h2>
<input type="text" placeholder="请输入用户名">
<input type="password" placeholder="请输入密码">
<input type="password" placeholder="确认密码">
<button>注册</button>
<div class="btn-box">
<a href=" ">已有账号？去登录</a >
</div>
</div>
</body>
</html>
